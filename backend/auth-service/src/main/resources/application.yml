spring:
  application:
    name: auth-service
  config:
    import: optional:configserver:http://localhost:8888
  datasource:
    url: jdbc:postgresql://localhost:5432/finpulse_auth
    username: finpulse
    password: finpulse123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8081

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
jwt:
  secret: finpulse-secret-key-que-deve-ter-pelo-menos-256-bits-de-comprimento-para-seguranca
  access-token-expiration: 900000
  refresh-token-expiration: 604800000
# ================================
# Informações da aplicação (/actuator/info)
# ================================
info:
  app:
    name: ${spring.application.name}
    description: Serviço de autenticação JWT do FinPulse
    version: 0.0.1-SNAPSHOT
    java-version: 17