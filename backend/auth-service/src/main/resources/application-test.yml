# ================================
# Perfil TEST - integração com PostgreSQL via Testcontainers
# ================================
spring:
  application:
    name: auth-service-test
  config:
    import: ""                            

  # Datasource: URL/user/password serão INJETADOS pelo Testcontainers em runtime
  datasource:
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate                  
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true                         
    locations: classpath:db/migration

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

jwt:
  secret: test-secret-key-que-deve-ter-pelo-menos-256-bits-de-comprimento-para-seguranca
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

server:
  port: 0

logging:
  level:
    root: WARN
    com.finpulse.auth: INFO
    org.testcontainers: INFO
    com.github.dockerjava: WARN