spring:
  data:
    redis:
      timeout: 2000ms
  cache:
    type: redis
    redis:
      cache-null-values: false

stock:
  cache:
    quote-ttl-seconds: 60
    company-ttl-seconds: 86400
  default-provider: alpha-vantage

eureka:
  instance:
    prefer-ip-address: true

resilience4j:
  circuitbreaker:
    instances:
      alpha-vantage:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-duration-threshold: 5s
        slow-call-rate-threshold: 80
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
        ignore-exceptions:
          - com.finpulse.stock.exception.StockNotFoundException
      finnhub:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-duration-threshold: 5s
        slow-call-rate-threshold: 80
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
        ignore-exceptions:
          - com.finpulse.stock.exception.StockNotFoundException
  retry:
    instances:
      alpha-vantage:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - com.finpulse.stock.exception.ExternalApiException
        ignore-exceptions:
          - com.finpulse.stock.exception.StockNotFoundException
          - io.github.resilience4j.circuitbreaker.CallNotPermittedException
      finnhub:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - com.finpulse.stock.exception.ExternalApiException
        ignore-exceptions:
          - com.finpulse.stock.exception.StockNotFoundException
          - io.github.resilience4j.circuitbreaker.CallNotPermittedException
  timelimiter:
    instances:
      external-apis:
        timeout-duration: 3s
        cancel-running-future: true
  bulkhead:
    instances:
      external-apis:
        max-concurrent-calls: 20
        max-wait-duration: 100ms
  ratelimiter:
    instances:
      external-apis:
        limit-for-period: 100
        limit-refresh-period: 1s
        timeout-duration: 0ms

management:
  endpoints:
    web:
      exposure:
        include: [health, info, metrics, prometheus, caches, circuitbreakers, circuitbreakerevents]
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  info:
    env:
      enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        "[http.server.requests]": true
      percentiles:
        "[http.server.requests]": 0.5, 0.95, 0.99
    tags:
      application: ${spring.application.name}

info:
  app:
    name: ${spring.application.name}
    description: Serviço de cotações de ações do FinPulse
    version: 0.0.1-SNAPSHOT
    java-version: 17

aop:
  logging-enabled: true
  metrics-enabled: true
  audit-enabled: false
