spring:
  data:
    mongodb:
      auto-index-creation: true

eureka:
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - metrics
          - prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  info:
    env:
      enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        "[http.server.requests]": true
      percentiles:
        "[http.server.requests]": 0.5, 0.95, 0.99
    tags:
      application: ${spring.application.name}

info:
  app:
    name: ${spring.application.name}
    description: Serviço de anotações do FinPulse
    version: 0.0.1-SNAPSHOT
    java-version: 17

aop:
  logging-enabled: true
  metrics-enabled: true
  audit-enabled: false
