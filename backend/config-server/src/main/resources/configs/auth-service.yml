# ================================
# auth-service - Perfil DEV
# ================================
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/finpulse_auth
    username: finpulse
    password: finpulse123
  jpa:
    show-sql: true                       # ver queries SQL no console

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: finpulse-secret-key-que-deve-ter-pelo-menos-256-bits-de-comprimento-para-seguranca
  access-token-expiration: 900000        # 15 minutos
  refresh-token-expiration: 604800000    # 7 dias

logging:
  level:
    com.finpulse.auth: DEBUG             # logs detalhados
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG

aop:
  logging-enabled: true
  metrics-enabled: true
  audit-enabled: true